<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预订成功 - 渝快游</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .success-container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }

        .success-container h1 {
            color: #4caf50;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .success-container p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .success-container a {
            text-decoration: none;
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .success-container a:hover {
            background-color: #45a049;
        }

        .success-icon {
            font-size: 50px;
            color: #4caf50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✔️</div>
        <h1>预订成功！</h1>
        <p>感谢您的使用，您的预订已成功完成。我们期待您的到来！</p>
        <a href="主页.html">返回首页</a>
    </div>
</body>
</html>
