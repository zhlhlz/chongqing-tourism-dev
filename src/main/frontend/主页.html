<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渝快游 - 用户主页</title>
    <style>
        /* 页面主体样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 使页面主体内容至少填满视口高度 */
        }

        /* 页眉样式 */
        header {
            background-color: #4caf50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* 容器样式 */
        .container {
            flex: 1; /* 让主体内容填充剩余空间 */
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto; /* 居中容器 */
        }

        .welcome {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        /* 轮播图样式 */
        .carousel {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            overflow: hidden; /* 隐藏超出边界的内容 */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* 添加阴影效果 */
        }

        .carousel-inner {
            display: flex; /* 使用弹性布局 */
            transition: transform 0.5s ease; /* 平滑切换效果 */
        }

        .carousel-item {
            min-width: 100%; /* 每次显示一张图片 */
            transition: opacity 0.5s ease;
        }

        .carousel-item img {
            width: 100%; /* 图片宽度自适应容器 */
            display: block;
            height: 400px; /* 固定高度 */
            object-fit: cover; /* 保持图片比例裁剪溢出部分 */
        }

        .carousel-controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between; /* 左右对齐 */
            transform: translateY(-50%); /* 垂直居中 */
        }

        .carousel-button {
            background-color: rgba(0, 0, 0, 0.5); /* 半透明背景 */
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer; /* 鼠标指针样式 */
            border-radius: 50%; /* 圆形按钮 */
            font-size: 18px;
            transition: background-color 0.3s; /* 背景色变化过渡效果 */
        }

        .carousel-button:hover {
            background-color: rgba(0, 0, 0, 0.8); /* 悬停时背景更深 */
        }

        .carousel-indicators {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%); /* 水平居中 */
            display: flex;
            gap: 10px; /* 指示器之间的间距 */
        }

        .indicator {
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.5); /* 默认半透明白色 */
            border-radius: 50%;
            cursor: pointer; /* 鼠标指针样式 */
            transition: background-color 0.3s; /* 颜色变化过渡效果 */
        }

        .indicator.active {
            background-color: rgba(255, 255, 255, 1); /* 当前激活的指示器为纯白色 */
        }

        /* 网格布局样式 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(300px, 1fr)); /* 每行2个，最小宽度300px */
            gap: 20px; /* 卡片间的间距 */
        }

        .card {
            background-color: #ffffff; /* 卡片背景色 */
            border-radius: 10px; /* 圆角 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* 阴影效果 */
            padding: 20px; /* 内边距 */
            text-align: center; /* 内容居中 */
            transition: transform 0.3s; /* 变换过渡效果 */
        }

        .card:hover {
            transform: translateY(-5px); /* 鼠标悬停时卡片上移 */
        }

        .card h3 {
            font-size: 18px; /* 标题字体大小 */
            margin-bottom: 10px; /* 标题底部间距 */
            color: #4caf50; /* 标题颜色 */
        }

        .card p {
            font-size: 14px; /* 内容字体大小 */
            color: #555; /* 内容颜色 */
        }

        .card a {
            text-decoration: none; /* 去掉下划线 */
            color: #4caf50; /* 链接文字颜色 */
            font-weight: bold; /* 加粗字体 */
        }

        /* 页脚样式 */
        footer {
            background-color: #4caf50;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: auto; /* 保证 footer 靠底部 */
        }
    </style>
</head>
<body>
<!-- 页眉部分，显示欢迎信息 -->
<header>欢迎来到渝快游</header>

<div class="container">
    <!-- 欢迎信息，可动态显示用户名 -->
    <div class="welcome">您好，<span id="username">游客</span>！欢迎回来。</div>

    <!-- 轮播图部分，展示多张图片 -->
    <div class="carousel">
        <div class="carousel-inner" id="carouselInner">
            <!-- 轮播图的每个项，包含一张图片 -->
            <div class="carousel-item">
                <img src="./pic/大美重庆.jpg" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="./pic/重庆印象.jpg" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="./pic/重庆旅游.jpg" alt="Slide 3">
            </div>
        </div>
        <!-- 轮播图的控制按钮，包括上一张和下一张 -->
        <div class="carousel-controls">
            <button class="carousel-button" id="prevButton">&#8249;</button>
            <button class="carousel-button" id="nextButton">&#8250;</button>
        </div>
        <!-- 轮播图的指示器，显示当前轮播图的位置 -->
        <div class="carousel-indicators" id="carouselIndicators">
            <span class="indicator active" data-slide="0"></span>
            <span class="indicator" data-slide="1"></span>
            <span class="indicator" data-slide="2"></span>
        </div>
    </div>

    <!-- 卡片部分，展示不同的功能选项 -->
    <div class="grid">
        <!-- 热门景点卡片，链接到热门景点界面 -->
        <div class="card">
            <h3>热门景点</h3>
            <p>查看重庆的热门旅游景点，计划您的旅程。</p>
            <a href='热门景点界面.html'>查看更多</a>
        </div>

        <!-- 推荐路线卡片，链接到推荐路线界面 -->
        <div class="card">
            <h3>推荐路线</h3>
            <p>探索我们为您推荐的经典旅游路线。</p>
            <a href='推荐路线界面.html'>查看路线</a>
        </div>

        <!-- 酒店预订卡片，链接到酒店预订界面 -->
        <div class="card">
            <h3>酒店预订</h3>
            <p>查找并预订理想的住宿地点。</p>
            <a href='酒店预订界面.html'>查看酒店</a>
        </div>

        <!-- 美食推荐卡片，链接到美食推荐界面 -->
        <div class="card">
            <h3>美食推荐</h3>
            <p>发现重庆的特色美食和餐厅。</p>
            <a href='美食推荐界面.html'>查看美食</a>
        </div>

        <!-- 管理员入口卡片 -->
        <div class="card">
            <h3>管理员入口</h3>
            <p>管理景点、美食、酒店信息和用户评论。</p>
            <a href='admin_login.html'>管理后台</a>
        </div>

        <!-- 讨论/社区互动入口卡片 -->
        <div class="card">
            <h3>社区互动</h3>
            <p>分享旅行心得，参与讨论与问答。</p>
            <a href='社区互动.html'>进入社区</a>
        </div>
    </div>
</div>

<!-- 页脚部分，显示版权信息 -->
<footer>
    渝快游 &copy;
</footer>

<script>
    // 获取轮播图元素
    const carouselInner = document.getElementById('carouselInner');
    // 获取轮播图的指示器元素
    const indicators = document.querySelectorAll('.indicator');
    // 当前轮播图的索引
    let currentIndex = 0;

    // 更新轮播图显示内容的函数
    function updateCarousel(index) {
        // 根据索引设置轮播图的偏移量
        carouselInner.style.transform = `translateX(-${index * 100}%)`;
        // 更新指示器的激活状态
        indicators.forEach((indicator, i) => {
            indicator.classList.toggle('active', i === index);
        });
    }

    // 上一张按钮的点击事件处理函数
    document.getElementById('prevButton').addEventListener('click', () => {
        // 计算上一张的索引，如果是第一张，则切换到最后一张
        currentIndex = (currentIndex > 0)? currentIndex - 1 : indicators.length - 1;
        updateCarousel(currentIndex);
    });

    // 下一张按钮的点击事件处理函数
    document.getElementById('nextButton').addEventListener('click', () => {
        // 计算下一张的索引，如果是最后一张，则切换到第一张
        currentIndex = (currentIndex < indicators.length - 1)? currentIndex + 1 : 0;
        updateCarousel(currentIndex);
    });

    // 点击指示器的事件处理函数
    indicators.forEach(indicator => {
        indicator.addEventListener('click', () => {
            // 获取指示器的数据属性，设置为当前索引
            currentIndex = parseInt(indicator.getAttribute('data-slide'));
            updateCarousel(currentIndex);
        });
    });
</script>
</body>
</html>
