<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>渝快游 - 注册</title>
    <!-- 图标库，与登录页保持一致 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        body::before{
            content:'';
            position:absolute; top:-50%; left:-50%;
            width:200%; height:200%;
            background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="10" r="0.5" fill="rgba(255,255,255,0.05)"/><circle cx="10" cy="60" r="0.5" fill="rgba(255,255,255,0.05)"/><circle cx="90" cy="40" r="0.5" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            animation: float 20s ease-in-out infinite;
            z-index: 1;
        }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-20px) rotate(180deg)} }

        /* 容器（毛玻璃卡片） */
        .register-container{
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.2);
            text-align: center;
            position: relative;
            z-index: 2;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from{opacity:0; transform:translateY(30px)} to{opacity:1; transform:translateY(0)} }

        /* 顶部 Logo 与标题（与登录页统一） */
        .logo-section { margin-bottom: 28px; }
        .logo{
            width: 80px; height: 80px; margin: 0 auto 18px;
            border-radius:50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .logo i{ color:#fff; font-size: 32px; }
        h1{
            font-size: 28px;
            background: linear-gradient(135deg,#667eea,#764ba2);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle{ color:#666; font-size:14px; }

        /* 表单与输入框（带图标） */
        form{ margin-top: 26px; display:flex; flex-direction:column; gap: 18px; }
        .form-item{ text-align:left; }
        .form-item label{
            display:block; margin-bottom:8px; font-weight:600; color:#333; font-size:14px;
        }
        .input-wrapper{
            position:relative;
        }
        .input-wrapper i{
            position:absolute; left:14px; top:50%; transform:translateY(-50%);
            color:#999; font-size:16px; z-index:3;
        }
        input{
            width:100%; padding:14px 14px 14px 44px;
            border:2px solid #e1e5e9; border-radius:12px;
            background:#f8f9fa; font-size:16px; outline:none;
            transition: all .25s ease;
        }
        input:focus{
            border-color:#667eea; background:#fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
        }

        /* 提交按钮 */
        .btn{
            padding: 14px;
            border: none; border-radius:12px; cursor:pointer;
            color:#fff; font-size:16px; font-weight:600;
            background: linear-gradient(135deg,#667eea,#764ba2);
            transition: all .3s ease; position:relative; overflow:hidden;
            margin-top: 6px;
        }
        .btn::before{
            content:''; position:absolute; top:0; left:-100%;
            width:100%; height:100%;
            background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
            transition: left .5s;
        }
        .btn:hover{ transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.3); }
        .btn:hover::before{ left:100%; }
        .btn[disabled]{ opacity:.7; cursor:not-allowed; }

        /* 信息提示（保留原有 msg 机制，但样式更美观） */
        .msg{
            margin-top:14px; padding:12px 14px; border-radius:12px; display:none; text-align:left;
            font-size:14px; line-height:1.5; white-space:pre-wrap;
        }
        .msg.ok{
            display:block; background:#e8fff3; border:1px solid #c2f1d9; color:#146c43;
        }
        .msg.err{
            display:block; background:#fff1f0; border:1px solid #ffd1cf; color:#7b1d1d;
        }

        /* 底部引导 */
        .extra{
            margin-top: 12px; font-size:14px; color:#666;
            display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
        }
        .extra a{
            color:#667eea; text-decoration:none; position:relative; font-weight:500;
        }
        .extra a::after{
            content:''; position:absolute; left:0; bottom:-2px; height:2px; width:0;
            background:linear-gradient(135deg,#667eea,#764ba2); transition: width .3s ease;
        }
        .extra a:hover{ color:#764ba2; }
        .extra a:hover::after{ width:100%; }

        /* 响应式 */
        @media (max-width: 480px){
            .register-container{ margin: 20px; padding: 30px 24px; }
            h1{ font-size:24px; }
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="logo-section">
        <div class="logo"><i class="fas fa-mountain"></i></div>
        <h1>渝快游</h1>
        <div class="subtitle">欢迎加入，开启你的旅程</div>
    </div>

    <form id="regForm" autocomplete="off" novalidate>
        <div class="form-item">
            <label for="username">用户名 *</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input id="username" name="username" placeholder="请输入用户名" required />
            </div>
        </div>

        <div class="form-item">
            <label for="email">邮箱 *</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input id="email" name="email" type="email" placeholder="name@example.com" required />
            </div>
        </div>

        <div class="form-item">
            <label for="password">密码 *</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input id="password" name="password" type="password" placeholder="不少于 6 位" required />
            </div>
        </div>

        <div class="form-item">
            <label for="confirm">确认密码 *</label>
            <div class="input-wrapper">
                <i class="fas fa-check-double"></i>
                <input id="confirm" name="confirm" type="password" placeholder="再次输入密码" required />
            </div>
        </div>

        <button id="submitBtn" class="btn" type="submit">注册</button>

        <div class="extra">
            <span>已有账号？</span><a href="登录界面.html">去登录</a>
        </div>
    </form>

    <div id="msg" class="msg"></div>
</div>

<script>
    // 与原文件保持一致：接口、字段与流程不变
    const API_BASE = 'http://localhost:8080';
    const $ = sel => document.querySelector(sel);

    const form = $('#regForm');
    const btn  = $('#submitBtn');
    const msg  = $('#msg');

    function showMsg(text, ok=false) {
        msg.className = 'msg ' + (ok ? 'ok' : 'err');
        msg.textContent = text;
        msg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.style.display = 'none';

        const username = $('#username').value.trim();
        const email    = $('#email').value.trim();
        const password = $('#password').value;
        const confirm  = $('#confirm').value;

        // 基础校验（与原逻辑一致）
        if (!username || !email || !password) {
            return showMsg('请填写用户名、邮箱、密码这三项。');
        }
        if (password !== confirm) {
            return showMsg('两次输入的密码不一致。');
        }
        if (password.length < 6) {
            return showMsg('密码长度至少 6 位。');
        }

        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = '正在提交…';

        try {
            const resp = await fetch(`${API_BASE}/api/user/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            let raw = ''; let data = {};
            try { raw = await resp.text(); data = JSON.parse(raw); } catch (_) {}

            const ok = resp.ok && (
                data?.success === true ||
                data?.code === 0 ||
                data?.affectedRows > 0 ||
                data?.userId
            );

            if (ok) {
                showMsg(`注册成功！用户ID: ${data.userId ?? ''}\n${data.message ?? ''}`, true);
                setTimeout(() => location.href = '登录界面.html', 1500);
            } else {
                const errText = (data && (data.message || data.error)) || `HTTP ${resp.status}`;
                showMsg(`注册失败：${errText}\n\n返回原文：\n${raw || '(空)'}`);
            }
        } catch (err) {
            showMsg('网络错误：' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    });

    // 轻微交互反馈（聚焦放大）
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function(){
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function(){
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    });
</script>
</body>
</html>
