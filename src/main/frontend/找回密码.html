<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .reset-container {
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .reset-container h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }

        .form-input {
            margin-bottom: 15px;
        }

        .form-input label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-input input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .reset-button {
            width: 100%;
            padding: 10px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-button:hover {
            background-color: #45a049;
        }

        .extra-links {
            margin-top: 15px;
            text-align: center;
        }

        .extra-links a {
            text-decoration: none;
            color: #007bff;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>找回密码</h1>
        <form action="/reset-password" method="POST">
            <div class="form-input">
                <label for="email">邮箱：</label>
                <input type="email" id="email" name="email" placeholder="请输入注册邮箱" required>
            </div>
            <button type="submit" class="reset-button">发送重置验证码</button>
        </form>

        <h1>设置新密码</h1>
        <form action="/update-password" method="POST">
            <div class="form-input">
                <label for="token">重置验证码：</label>
                <input type="text" id="token" name="token" placeholder="请输入重置令牌" required>
            </div>
            <div class="form-input">
                <label for="new_password">新密码：</label>
                <input type="password" id="new_password" name="new_password" placeholder="请输入新密码" required>
            </div>
            <div class="form-input">
                <label for="confirm_password">确认新密码：</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" required>
            </div>
            <button type="submit" class="reset-button">设置新密码</button>
        </form>

        <div class="extra-links">
            <a href="登录界面.html">返回登录</a>
        </div>
    </div>
</body>
</html>
