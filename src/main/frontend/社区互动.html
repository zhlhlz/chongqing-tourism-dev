<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区互动 - 渝快游</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        /* 顶部固定导航 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
        }
        nav a { display: inline-block; color: #fff; text-decoration: none; padding: 12px 14px; font-size: 15px; }
        nav a:hover { background: #ddd; color: green; }
        nav a.active { background: #4caf50; color: #fff; }

        header {
            background-color: #4caf50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 60px;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .title {
            font-size: 28px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .post-form {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
            margin-bottom: 30px;
        }

        .post-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            font-size: 14px;
        }

        .post-form button {
            margin-top: 10px;
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .post-form button:hover {
            background-color: #45a049;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-item {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        .post-item h3 {
            font-size: 18px;
            color: #4caf50;
            margin-bottom: 10px;
        }

        .post-item p {
            font-size: 14px;
            color: #555;
        }

        .post-item .interaction-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .interaction-buttons button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        footer {
            background-color: #4caf50;
            color: white;
            text-align: center;
            padding: 25px 0;
        }


        .interaction-buttons button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <nav>
        <a href="主页.html">主页</a>
        <a href="热门景点界面.html">热门景点</a>
        <a href="推荐路线界面.html">推荐路线</a>
        <a href="酒店预订界面.html">酒店预订</a>
        <a href="美食推荐界面.html">美食推荐</a>
        <a href="社区互动.html" class="active">社区互动</a>
    </nav>

    <header>渝快游 - 社区互动</header>

    <div class="container">
        <div class="title">社区互动</div>

        <div class="post-form">
            <input type="text" id="postTitle" placeholder="标题..." style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
            <textarea id="newPostContent" rows="4" placeholder="分享您的旅行经历或提问..."></textarea>
            <button onclick="addPost()">发布</button>
        </div>

        <div class="post-list" id="postList">
            <div class="loading" style="text-align: center; padding: 40px;">
                <p>正在加载社区动态...</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        
        // 页面加载时获取帖子
        document.addEventListener('DOMContentLoaded', async () => {
            await loadPosts();
        });

        // 加载帖子列表
        async function loadPosts() {
            try {
                const response = await fetch(`${API_BASE_URL}/community/posts`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    renderPosts(result.data);
                } else {
                    console.error('API返回错误:', result);
                    document.getElementById('postList').innerHTML = '<div class="error" style="text-align: center; padding: 40px; color: red;"><p>加载社区动态失败，请刷新页面重试</p></div>';
                }
            } catch (error) {
                console.error('加载帖子失败:', error);
                document.getElementById('postList').innerHTML = '<div class="error" style="text-align: center; padding: 40px; color: red;"><p>加载社区动态失败，请刷新页面重试</p></div>';
            }
        }

        // 渲染帖子列表
        function renderPosts(posts) {
            const postList = document.getElementById('postList');
            
            if (posts.length === 0) {
                postList.innerHTML = '<div class="no-data" style="text-align: center; padding: 40px;"><p>暂无社区动态</p></div>';
                return;
            }

            postList.innerHTML = posts.map(post => `
                <div class="post-item">
                    <h3>${post.username || '用户'}</h3>
                    <h4>${post.title}</h4>
                    <p>${post.content}</p>
                    <small style="color: #999;">${new Date(post.created_at).toLocaleString()}</small>
                    <div class="interaction-buttons">
                        <button onclick="likePost(this)">点赞</button>
                        <button onclick="replyPost(this, ${post.id})">回复</button>
                    </div>
                </div>
            `).join('');
        }

        // 发布新帖子
        async function addPost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('newPostContent').value.trim();
            const currentUser = getCurrentUser();
            
            if (!title || !content) {
                alert('标题和内容不能为空！');
                return;
            }

            if (!currentUser || !currentUser.id) {
                alert('请先登录后再发布社区动态。');
                window.location.href = '登录界面.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/community/posts`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({
                        userId: currentUser.id,
                        title: title,
                        content: content
                    })
                });

                if (response.ok) {
                    alert('发布成功！');
                    document.getElementById('postTitle').value = '';
                    document.getElementById('newPostContent').value = '';
                    await loadPosts(); // 重新加载帖子列表
                } else {
                    alert('发布失败，请重试');
                }
            } catch (error) {
                console.error('发布帖子失败:', error);
                alert('网络错误，请检查后端服务');
            }
        }

        function getCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem('user') || 'null');
            } catch (error) {
                return null;
            }
        }

        function getAuthHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            const token = localStorage.getItem('userToken');
            if (token) {
                headers.Authorization = `Bearer ${token}`;
            }
            return headers;
        }

        function likePost(button) {
            alert('您点赞了这条动态！');
        }

        function replyPost(button, postId) {
            alert('回复功能待开发！');
        }
    </script>

    <footer>
    渝快游 &copy;
    </footer>

</body>
</html>
