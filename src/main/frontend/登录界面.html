<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渝快游 - 登录</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰元素 */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="10" r="0.5" fill="rgba(255,255,255,0.05)"/><circle cx="10" cy="60" r="0.5" fill="rgba(255,255,255,0.05)"/><circle cx="90" cy="40" r="0.5" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            animation: float 20s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* 登录容器样式 */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 
                        0 0 0 1px rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo区域 */
        .logo-section {
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo i {
            font-size: 32px;
            color: white;
        }

        .login-container h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .login-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* 表单样式 */
        .login-container form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-input {
            position: relative;
        }

        .form-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            text-align: left;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            z-index: 3;
        }

        .form-input input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            background: #f8f9fa;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input input:focus + i {
            color: #667eea;
        }

        /* 登录按钮样式 */
        .login-button {
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        /* 额外链接样式 */
        .extra-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .extra-links a {
            text-decoration: none;
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .extra-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .extra-links a:hover::after {
            width: 100%;
        }

        .extra-links a:hover {
            color: #764ba2;
        }

        .divider {
            color: #ccc;
            font-size: 14px;
        }

        /* 返回链接样式 */
        .back-link {
            margin-top: 25px;
            text-align: center;
        }

        .back-link a {
            text-decoration: none;
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .back-link a:hover::after {
            width: 100%;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 25px;
            }
            
            .login-container h1 {
                font-size: 24px;
            }
            
            .extra-links {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* 加载动画 */
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo区域 -->
        <div class="logo-section">
            <div class="logo">
                <i class="fas fa-mountain"></i>
            </div>
            <h1>渝快游</h1>
            <p class="login-subtitle">探索重庆之美，享受精彩旅程</p>
        </div>

        <form id="loginForm">
            <!-- 用户名输入框 -->
            <div class="form-input">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
            </div>
            
            <!-- 密码输入框 -->
            <div class="form-input">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
            </div>
            
            <!-- 登录按钮 -->
            <button type="submit" class="login-button">
                <span class="button-text">登录</span>
                <div class="loading"></div>
            </button>
        </form>
        
        <div class="extra-links">
            <a href='注册界面.html'>
                <i class="fas fa-user-plus"></i> 注册账户
            </a>
            <span class="divider">|</span>
            <a href='找回密码.html'>
                <i class="fas fa-key"></i> 忘记密码？
            </a>
        </div>
        
        <div class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i> 返回入口选择
            </a>
        </div>
    </div>

    <!-- 引入API工具类 -->
    <script src="js/api.js"></script>
    
    <script>
        // 为登录表单添加提交事件监听器
        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault(); // 阻止表单的默认提交行为

            // 获取用户名和密码输入值
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const button = document.querySelector('.login-button');
            const buttonText = document.querySelector('.button-text');
            const loading = document.querySelector('.loading');

            // 判断是否输入了用户名和密码
            if (username && password) {
                // 显示加载状态
                buttonText.style.display = 'none';
                loading.style.display = 'block';
                button.disabled = true;
                button.style.opacity = '0.7';

                try {
                    // 使用API类发送登录请求
                    const result = await api.login({
                        username: username,
                        password: password
                    });

                    // 恢复按钮状态
                    buttonText.style.display = 'block';
                    loading.style.display = 'none';
                    button.disabled = false;
                    button.style.opacity = '1';

                    if (result.success) {
                        // 登录成功，保存用户信息到localStorage
                        localStorage.setItem('user', JSON.stringify(result.user));
                        if (result.token) {
                            localStorage.setItem('userToken', result.token);
                        }
                        
                        // 显示成功提示并跳转
                        showNotification('登录成功！即将跳转到主页。', 'success');
                        setTimeout(() => {
                            window.location.href = '主页.html';
                        }, 1500);
                    } else {
                        // 登录失败
                        showNotification(result.message || '登录失败，请重试', 'error');
                        // 添加错误动画
                        const inputs = document.querySelectorAll('input');
                        inputs.forEach(input => {
                            input.style.borderColor = '#e74c3c';
                            input.style.animation = 'shake 0.5s ease-in-out';
                            setTimeout(() => {
                                input.style.borderColor = '#e1e5e9';
                                input.style.animation = '';
                            }, 500);
                        });
                    }

                } catch (error) {
                    console.error('登录请求错误:', error);
                    
                    // 恢复按钮状态
                    buttonText.style.display = 'block';
                    loading.style.display = 'none';
                    button.disabled = false;
                    button.style.opacity = '1';

                    showNotification('网络错误，请检查后端服务是否启动', 'error');
                }
            } else {
                showNotification('请输入用户名和密码！', 'error');
                // 添加错误动画
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    if (!input.value.trim()) {
                        input.style.borderColor = '#e74c3c';
                        input.style.animation = 'shake 0.5s ease-in-out';
                        setTimeout(() => {
                            input.style.borderColor = '#e1e5e9';
                            input.style.animation = '';
                        }, 500);
                    }
                });
            }
        });

        // 通知提示函数
        function showNotification(message, type) {
            // 移除已存在的通知
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }

            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;

            // 添加通知样式
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#27ae60' : '#e74c3c'};
                color: white;
                padding: 15px 20px;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                z-index: 1000;
                display: flex;
                align-items: center;
                gap: 10px;
                font-weight: 500;
                animation: slideInRight 0.3s ease-out;
                max-width: 300px;
            `;

            // 添加动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideInRight {
                    from {
                        transform: translateX(100%);
                        opacity: 0;
                    }
                    to {
                        transform: translateX(0);
                        opacity: 1;
                    }
                }
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    25% { transform: translateX(-5px); }
                    75% { transform: translateX(5px); }
                }
            `;
            document.head.appendChild(style);

            document.body.appendChild(notification);

            // 3秒后自动移除通知
            setTimeout(() => {
                notification.style.animation = 'slideInRight 0.3s ease-out reverse';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.remove();
                    }
                }, 300);
            }, 3000);
        }

        // 输入框焦点效果
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });

            // 输入时清除错误状态
            input.addEventListener('input', function() {
                if (this.style.borderColor === 'rgb(231, 76, 60)') {
                    this.style.borderColor = '#e1e5e9';
                }
            });
        });

        // 页面加载完成后的动画
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.login-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.8s ease-out';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
