<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渝快游 - 入口</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f4f6f8; }
    .wrapper { width: 100%; max-width: 520px; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); padding: 24px; }
    h1 { font-size: 22px; color: #222; text-align: center; margin-bottom: 8px; }
    p.sub { color: #666; text-align: center; margin-bottom: 20px; }
    .options { display: grid; grid-template-columns: 1fr; gap: 12px; }
    a.option { display: block; text-decoration: none; padding: 14px 16px; border: 1px solid #e5e7eb; border-radius: 10px; color: #111; transition: all .2s ease; background: #fafafa; }
    a.option:hover { background: #f0fdf4; border-color: #22c55e; }
    .title { font-weight: 700; color: #16a34a; margin-bottom: 4px; }
    .desc { font-size: 14px; color: #555; }
    .footer { text-align: center; font-size: 12px; color: #888; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>渝快游 - 入口</h1>
      <p class="sub">请选择要进入的系统</p>
      <div class="options">
        <a class="option" href="登录界面.html">
          <div class="title">用户登录</div>
          <div class="desc">进入用户端，浏览景点/美食/酒店并下单</div>
        </a>
        <a class="option" href="admin_login.html">
          <div class="title">管理员登录</div>
          <div class="desc">进入后台管理景点、美食、酒店与评论</div>
        </a>
      </div>
      <div class="footer">渝快游
    </div>
  </div>
</body>
</html>
