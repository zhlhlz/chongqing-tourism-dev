<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食推荐 - 渝快游</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        header {
            background-color: #4caf50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
        }

        nav a {
            display: inline-block;
            color: white;
            text-align: center;
            padding: 12px 14px;
            text-decoration: none;
            font-size: 15px;
        }

        nav a:hover {
            background-color: #ddd;
            color: green;
        }

        nav a.active {
            background-color: #4caf50;
            color: white;
        }

        /* 购物车功能已删除 */

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .title {
            font-size: 28px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .list-item {
            display: flex;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .list-item:hover {
            transform: translateY(-5px);
        }

        .list-item img {
            width: 200px;
            height: 200px;
            object-fit: cover;
        }

        .content {
            padding: 20px;
            flex: 1;
        }

        .content h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #4caf50;
        }

        .content p {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }

        .content a {
            text-decoration: none;
            color: white;
            background-color: #4caf50;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 14px;
            display: inline-block;
            transition: background-color 0.3s;
        }

        .content a:hover {
            background-color: #45a049;
        }

        footer {
            margin-top: 30px;
            background-color: #4caf50;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>

<!-- 顶部导航菜单 -->
<nav>
    <a href="./主页.html">主页</a>
    <a href="./热门景点界面.html">热门景点</a>
    <a href="./推荐路线界面.html">推荐路线</a>
    <a href="./酒店预订界面.html">酒店预订</a>
    <a href="./美食推荐界面.html" class="active">美食推荐</a>
</nav>

<header style="margin-top:60px;">渝快游 - 美食推荐</header>

<!-- 购物车功能已删除 -->

<div class="container">
    <div class="title">美食推荐</div>
    <div class="list" id="foodsList">
        <!-- 美食列表将通过JavaScript动态加载 -->
        <div class="loading" style="text-align: center; padding: 40px;">
            <p>正在加载美食信息...</p>
        </div>
    </div>
</div>

<!-- 引入 API 和 food.js 文件 -->
<script src="./js/api.js"></script>
<script src="./js/food.js" defer></script>

<footer>
    渝快游 &copy;
</footer>
</body>
</html>
